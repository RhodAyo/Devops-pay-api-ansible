---
- name: Configure full stack
  hosts: webservers
  become: yes
  roles:
    - pay-api

- name: Configure database
  hosts: dbservers
  become: yes
  tasks:
    - name: Install MariaDB (Debian)
      apt:
        name: mariadb-server
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install MariaDB (Amazon Linux / RHEL)
      yum:
        name: mariadb105-server
        state: present
      when: ansible_os_family == "RedHat"

    - name: Start MariaDB
      service:
        name: mariadb
        state: started
        enabled: yes

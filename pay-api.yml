- name: Configure pay-api web nodes
  hosts: webservers
  become: yes

  vars:
    web_package:
      RedHat: httpd
      Debian: apache2

    web_service:
      RedHat: httpd
      Debian: apache2

  tasks:
    - name: Update yum cache (RedHat)
      ansible.builtin.yum:
        update_cache: yes
      when: ansible_os_family == "RedHat"

    - name: Update apt cache (Debian)
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install web server
      ansible.builtin.package:
        name: "{{ web_package[ansible_os_family] }}"
        state: present

    - name: Start and enable web service
      ansible.builtin.service:
        name: "{{ web_service[ansible_os_family] }}"
        state: started
        enabled: yes

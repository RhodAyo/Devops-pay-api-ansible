    - name: Update yum cache (RedHat)
      ansible.builtin.yum:
        update_cache: yes
      when: ansible_os_family == "RedHat"

    - name: Update apt cache (Debian)
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install web server
      ansible.builtin.package:
        name: "{{ web_package[ansible_os_family] }}"
        state: present

    - name: Start and enable web service
      ansible.builtin.service:
        name: "{{ web_service[ansible_os_family] }}"
        state: started
        enabled: yes

    - name: Deploy custom welcome page
      ansible.builtin.template:
        src: templates/index.html.j2
        dest: /var/www/html/index.html
        backup: yes
      notify: Restart web service

    - name: Install standard tools on CentOS
      ansible.builtin.yum:
        name: "{{ item }}"
        state: present
      loop:
        - git
        - wget
        - zip
        - unzip
      when: ansible_os_family == "RedHat"
